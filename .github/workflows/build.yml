name: Build and Publish XBPS Repository
on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build.yml"
      - "packages/**"
      - "keyring/**"
  workflow_dispatch:
concurrency:
  group: publish
  cancel-in-progress: true
jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      keyring_changed: ${{ steps.filter.outputs.keyring }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            keyring:
              - 'keyring/**'

  build:
    name: Build — ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: ""
            host_arch_flag: ""
          - target: x86_64-musl
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: ""
            host_arch_flag: "-A x86_64-musl"
          - target: aarch64
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: "aarch64"
            host_arch_flag: ""
          - target: aarch64-musl
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: "aarch64-musl"
            host_arch_flag: ""
          - target: armv6l
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: "armv6l"
            host_arch_flag: ""
          - target: armv6l-musl
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: "armv6l-musl"
            host_arch_flag: ""
          - target: armv7l
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: "armv7l"
            host_arch_flag: ""
          - target: armv7l-musl
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: "armv7l-musl"
            host_arch_flag: ""
          - target: i686
            void_container: ghcr.io/void-linux/void-glibc-full:latest
            cross_arch: ""
            host_arch_flag: "-A i686"
    container:
      image: ${{ matrix.void_container }}
      options: --privileged
    steps:
      - name: Install base build tools
        run: |
          xbps-install -Syu xbps
          xbps-install -yu \
            git \
            curl \
            wget \
            ca-certificates \
            bash \
            coreutils \
            findutils \
            gawk \
            grep \
            sed \
            tar \
            gzip \
            xz \
            bzip2 \
            zstd \
            openssl
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone void-packages
        run: |
          git clone --depth=1 \
            https://github.com/void-linux/void-packages.git \
            /void-packages
      - name: Restore xbps-src cache
        uses: actions/cache@v4
        with:
          path: |
            /void-packages/hostdir/binpkgs
            /void-packages/masterdir
          key: xbps-src-${{ matrix.target }}-${{ hashFiles('packages/**/template') }}
          restore-keys: |
            xbps-src-${{ matrix.target }}-
      - name: Bootstrap xbps-src
        working-directory: /void-packages
        run: |
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_CHROOT_CMD=uchroot"        >> etc/conf

          if [ -n "${{ matrix.host_arch_flag }}" ]; then
            ./xbps-src ${{ matrix.host_arch_flag }} binary-bootstrap
          else
            ./xbps-src binary-bootstrap
          fi
      - name: Copy package templates
        run: |
          for pkg_dir in packages/*/; do
            pkg_name="$(basename "$pkg_dir")"
            echo "→ Copying template: $pkg_name"
            rm -rf /void-packages/srcpkgs/"$pkg_name"
            cp -r "$pkg_dir" /void-packages/srcpkgs/"$pkg_name"
          done
      - name: Register local binpkgs and pin local packages
        working-directory: /void-packages
        run: |
          mkdir -p hostdir/binpkgs
          xbps-rindex -a hostdir/binpkgs/*.xbps 2>/dev/null || true
          mkdir -p masterdir/etc/xbps.d

          echo "repository=$(pwd)/hostdir/binpkgs" > masterdir/etc/xbps.d/00-local.conf

          for pkg_dir in "${GITHUB_WORKSPACE}"/packages/*/; do
            pkg_name="$(basename "$pkg_dir")"
            echo ">> Pinning $pkg_name to build from local template"
            echo "ignorepkg=$pkg_name" >> masterdir/etc/xbps.d/00-local.conf
          done
      - name: Install cross-compiler
        if: matrix.cross_arch != ''
        working-directory: /void-packages
        run: |
          LIBC="glibc"
          ARCH="${{ matrix.cross_arch }}"
          case "$ARCH" in *-musl) LIBC="musl" ;; esac
          BASE_ARCH="${ARCH%%-musl}"

          case "$BASE_ARCH" in
            aarch64)  TRIPLE="aarch64-linux-gnu${LIBC:+hf}" ;;
            armv6l)   TRIPLE="armv6l-linux-gnueabihf" ;;
            armv7l)   TRIPLE="armv7l-linux-gnueabihf" ;;
            *)        TRIPLE="" ;;
          esac

          xbps-install -Syu || true
          if [ -n "$TRIPLE" ]; then
            xbps-install -y "cross-${TRIPLE}" || true
          fi
      - name: Determine build order
        run: |
          xbps-rindex -a /void-packages/hostdir/binpkgs/*.xbps 2>/dev/null || true

          ORDER_FILE="${GITHUB_WORKSPACE}/build_order.txt"
          > "$ORDER_FILE"

          for pkg_dir in "${GITHUB_WORKSPACE}"/packages/*/; do
            pkg_name="$(basename "$pkg_dir")"
            deps="$(grep '^depends=' "$pkg_dir/template" 2>/dev/null | sed 's/depends=//;s/"//g')"
            is_meta=false
            for dep in $deps; do
              dep_name="${dep%%[><=]*}"
              if [ -d "${GITHUB_WORKSPACE}/packages/${dep_name}" ]; then
                is_meta=true
                break
              fi
            done
            if [ "$is_meta" = "false" ]; then
              echo "$pkg_name" >> "$ORDER_FILE"
            fi
          done

          for pkg_dir in "${GITHUB_WORKSPACE}"/packages/*/; do
            pkg_name="$(basename "$pkg_dir")"
            if ! grep -qx "$pkg_name" "$ORDER_FILE"; then
              echo "$pkg_name" >> "$ORDER_FILE"
            fi
          done

          echo "Build order:"
          cat "$ORDER_FILE"
      - name: Build packages
        working-directory: /void-packages
        run: |
          TARGET="${{ matrix.target }}"
          CROSS_ARCH="${{ matrix.cross_arch }}"
          HOST_FLAG="${{ matrix.host_arch_flag }}"
          FAILED_PKGS=""
          BUILT_COUNT=0

          while IFS= read -r pkg_name; do
            pkg_dir="/void-packages/srcpkgs/${pkg_name}/"

            if [ ! -f "${GITHUB_WORKSPACE}/packages/${pkg_name}/template" ]; then
              continue
            fi

            PKG_ARCHS=""
            if grep -q "^archs=" "${pkg_dir}template" 2>/dev/null; then
              PKG_ARCHS="$(grep "^archs=" "${pkg_dir}template" | \
                sed 's/archs=//; s/"//g; s/'\''//g')"
            fi

            SHOULD_BUILD=true
            if [ -n "$PKG_ARCHS" ]; then
              SHOULD_BUILD=false
              for allowed_arch in $PKG_ARCHS; do
                if echo "$allowed_arch" | grep -q "^~"; then
                  excluded="${allowed_arch#~}"
                  if [ "$TARGET" = "$excluded" ]; then
                    SHOULD_BUILD=false
                    break
                  else
                    SHOULD_BUILD=true
                  fi
                elif [ "$allowed_arch" = "$TARGET" ] || \
                     [ "$allowed_arch" = "noarch" ]; then
                  SHOULD_BUILD=true
                  break
                fi
              done
            fi

            if [ "$SHOULD_BUILD" = "false" ]; then
              echo "⏭  Skipping $pkg_name — not supported on $TARGET (archs: $PKG_ARCHS)"
              continue
            fi

            echo ""
            echo "══════════════════════════════════════════"
            echo "  Building: $pkg_name  →  $TARGET"
            echo "══════════════════════════════════════════"

            BUILD_CMD="./xbps-src"

            if [ -n "$HOST_FLAG" ]; then
              BUILD_CMD="$BUILD_CMD $HOST_FLAG"
            fi

            if [ -n "$CROSS_ARCH" ]; then
              BUILD_CMD="$BUILD_CMD -a $CROSS_ARCH"
            fi

            BUILD_CMD="$BUILD_CMD pkg $pkg_name"

            echo "Running: $BUILD_CMD"
            EXISTING=$(find /void-packages/hostdir/binpkgs -name "${pkg_name}-*.xbps" 2>/dev/null | head -1)
            if [ -n "$EXISTING" ]; then
              echo "⏭  $pkg_name already built (cached): $(basename "$EXISTING")"
              BUILT_COUNT=$((BUILT_COUNT + 1))
            elif eval "$BUILD_CMD"; then
              echo "✔ Built $pkg_name successfully"
              BUILT_COUNT=$((BUILT_COUNT + 1))
              xbps-rindex -a /void-packages/hostdir/binpkgs/*.xbps 2>/dev/null || true
            else
              echo "✘ FAILED: $pkg_name"
              FAILED_PKGS="$FAILED_PKGS $pkg_name"
            fi
          done < "${GITHUB_WORKSPACE}/build_order.txt"

          echo ""
          echo "Build summary for $TARGET:"
          echo "  Built: $BUILT_COUNT packages"
          if [ -n "$FAILED_PKGS" ]; then
            echo "  Failed:$FAILED_PKGS"
          fi
      - name: Save xbps-src cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /void-packages/hostdir/binpkgs
            /void-packages/masterdir
          key: xbps-src-${{ matrix.target }}-${{ hashFiles('packages/**/template') }}
      - name: Collect built packages
        run: |
          TARGET="${{ matrix.target }}"
          STAGING="${GITHUB_WORKSPACE}/staging/${TARGET}"
          mkdir -p "$STAGING"

          BINPKGS_BASE="/void-packages/hostdir/binpkgs"

          CROSS="${{ matrix.cross_arch }}"

          if [ -n "$CROSS" ]; then
            SRC_DIR="${BINPKGS_BASE}/${CROSS}"
          else
            SRC_DIR="${BINPKGS_BASE}"
          fi

          if [ -d "$SRC_DIR" ]; then
            find "$SRC_DIR" -name "*.xbps" | while read -r pkg; do
              cp "$pkg" "$STAGING/"
              echo "  + $(basename "$pkg")"
            done
          else
            echo "WARNING: expected output dir not found: $SRC_DIR"
            echo "Falling back to searching all of binpkgs/ for *.$TARGET.xbps"
            find "$BINPKGS_BASE" -name "*.$TARGET.xbps" | while read -r pkg; do
              cp "$pkg" "$STAGING/"
              echo "  + $(basename "$pkg")"
            done
          fi

          PKG_COUNT="$(find "$STAGING" -name "*.xbps" | wc -l)"
          echo "Collected $PKG_COUNT package(s) for $TARGET"
      - name: Sign packages and index repository
        env:
          XBPS_PASSPHRASE: ${{ secrets.XBPS_PASSPHRASE }}
          SIGN_BY: ${{ secrets.SIGN_BY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          TARGET="${{ matrix.target }}"
          STAGING="${GITHUB_WORKSPACE}/staging/${TARGET}"

          if [ ! -d "$STAGING" ] || \
             [ "$(find "$STAGING" -name "*.xbps" | wc -l)" -eq 0 ]; then
            echo "No packages built for $TARGET — skipping signing step"
            exit 0
          fi

          PRIVKEY_FILE="$(mktemp /tmp/privkey.XXXXXX.pem)"
          printf '%s' "$PRIVATE_KEY" > "$PRIVKEY_FILE"
          chmod 600 "$PRIVKEY_FILE"

          echo "Indexing packages..."
          XBPS_TARGET_ARCH="$TARGET" xbps-rindex -a "$STAGING"/*.xbps

          echo "Signing package files..."
          for pkg in "$STAGING"/*.xbps; do
            xbps-rindex \
              --privkey "$PRIVKEY_FILE" \
              --sign-pkg \
              "$pkg"
          done

          echo "Signing repodata index..."
          XBPS_TARGET_ARCH="$TARGET" xbps-rindex \
            --privkey "$PRIVKEY_FILE" \
            --sign \
            --signedby "$SIGN_BY" \
            "$STAGING"

          rm -f "$PRIVKEY_FILE"

          echo "Done. Final staging contents:"
          ls -lh "$STAGING"
      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-${{ matrix.target }}
          path: staging/${{ matrix.target }}/
          retention-days: 1
          if-no-files-found: warn
  publish:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
      - name: Download all staging artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: repo-*
          path: all-staging/
          merge-multiple: false
      - name: Upload packages to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          for arch_dir in all-staging/repo-*/; do
            arch="$(basename "$arch_dir" | sed 's/^repo-//')"
            TAG="${arch}"

            FILES="$(find "$arch_dir" \( \
              -name "*.xbps" \
              -o -name "*.xbps.sig" \
              -o -name "*.xbps.sig2" \
              -o -name "*-repodata" \
            \) | tr '\n' ' ')"

            if [ -z "$(echo "$FILES" | tr -d ' ')" ]; then
              echo "⚠  $arch: nothing to upload, skipping"
              continue
            fi

            echo "→ Recreating release: $TAG"
            gh release delete "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --yes 2>/dev/null || true

            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "${arch}" \
              --notes "An XBPS binary repository for \`${arch}\`." \
              --prerelease \
              $FILES

            echo "✔ $arch: uploaded"
          done
      - name: Checkout master for Pages landing page
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          path: main-repo
      - name: Build and deploy landing page only
        run: |
          mkdir -p pages

          cp main-repo/index.html pages/index.html 2>/dev/null || true
          cp main-repo/packages.html pages/packages.html 2>/dev/null || true
          cp main-repo/favicon.svg pages/favicon.svg 2>/dev/null || true
          cp main-repo/void-supplements.pub.pem pages/void-supplements.pub.pem 2>/dev/null || true

          REPO_OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          ARCH_ROWS=""
          for arch_dir in all-staging/repo-*/; do
            arch="$(basename "$arch_dir" | sed 's/^repo-//')"
            count="$(find "$arch_dir" -name "*.xbps" | wc -l)"
            TAG="${arch}"
            REPO_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
            if [ "$count" -gt 0 ]; then
              ARCH_ROWS="${ARCH_ROWS}<tr><td class='arch'>${arch}</td><td class='status-ok'>${count} package(s)</td><td class='conf'><code>repository=${REPO_URL}</code></td></tr>"
            fi
          done

          sed -i "s|<!-- ARCH_ROWS_PLACEHOLDER -->|${ARCH_ROWS}|g" pages/index.html || true
      - name: Generate packages.json
        run: |
          printf '[\n' > pages/packages.json
          FIRST=1
          for arch_dir in all-staging/repo-*/; do
            arch="$(basename "$arch_dir" | sed 's/^repo-//')"
            for pkg in "$arch_dir"*.xbps; do
              [ -f "$pkg" ] || continue
              fname="$(basename "$pkg")"
              base="${fname%.xbps}"
              pkgarch="${base##*.}"
              verrev="${base%.*}"
              pkgname="$(echo "$verrev" | sed 's/-[0-9].*//')"
              version="$(echo "$verrev" | sed "s/^${pkgname}-//")"
              size="$(stat -c%s "$pkg")"
              TAG="${arch}"
              url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${fname}"
              [ "$FIRST" -eq 1 ] && FIRST=0 || printf ',\n' >> pages/packages.json
              printf '  {"name":"%s","version":"%s","arch":"%s","filename":"%s","size":%s,"url":"%s"}' \
                "$pkgname" "$version" "$arch" "$fname" "$size" "$url" >> pages/packages.json
            done
          done
          printf '\n]\n' >> pages/packages.json
          echo "packages.json generated:"
          cat pages/packages.json
      - name: Deploy landing page to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          publish_branch: site
          publish_dir: pages/
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
  publish-keyring:
    name: Build and publish keyring bootstrap package
    needs: check-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.check-changes.outputs.keyring_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    steps:
      - name: Install build tools
        run: |
          xbps-install -Syu xbps
          xbps-install -yu git ca-certificates
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build keyring package
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          XBPS_PASSPHRASE: ${{ secrets.XBPS_PASSPHRASE }}
          SIGN_BY: ${{ secrets.SIGN_BY }}
        run: |
          PRIVKEY_FILE="$(mktemp /tmp/privkey.XXXXXX.pem)"
          printf '%s' "$PRIVATE_KEY" > "$PRIVKEY_FILE"
          chmod 600 "$PRIVKEY_FILE"

          STAGE="$(mktemp -d)"
          mkdir -p "${STAGE}/var/db/xbps/keys"

          cp keyring/void-supplements.pub.plist \
             "${STAGE}/var/db/xbps/keys/void-supplements.pub.plist"

          cp keyring/INSTALL "${STAGE}/INSTALL"
          chmod +x "${STAGE}/INSTALL"

          PKGNAME="repo-void-supplements"
          PKGVER="${PKGNAME}-1.0_1"

          xbps-create \
            --architecture noarch \
            --pkgver        "${PKGVER}" \
            --desc          "enable the void-supplements repository" \
            --homepage      "https://github.com/${GITHUB_REPOSITORY}" \
            --license       "MIT" \
            --maintainer    "${SIGN_BY}" \
            "$STAGE"

          xbps-rindex \
            --privkey "$PRIVKEY_FILE" \
            --sign-pkg \
            "${PKGVER}.noarch.xbps"

          xbps-rindex -a "${PKGVER}.noarch.xbps"
          XBPS_TARGET_ARCH=noarch xbps-rindex \
            --privkey "$PRIVKEY_FILE" \
            --sign \
            --signedby "$SIGN_BY" \
            .

          rm -f "$PRIVKEY_FILE"
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"
      - name: Publish to GitHub Releases (bootstrap tag)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="bootstrap"

          gh release delete "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --yes 2>/dev/null || true

          cat <<EOF > release_notes.md
          ## void-supplements bootstrap package

          Install this once to add the void-supplements repository to your Void Linux system.

          \`\`\`sh
          sudo xbps-install \\
            --repository=https://github.com/${GITHUB_REPOSITORY}/releases/download/bootstrap \\
            ${{ env.PKGNAME }}
          \`\`\`

          The post-install script will:
          - Trust the signing key
          - Detect your architecture
          - Write \`/etc/xbps.d/00-master-void-supplements.conf\`
          - Give void-supplements package priority over the official repositories

          **To remove:** \`xbps-remove ${{ env.PKGNAME }} && rm /etc/xbps.d/00-master-void-supplements.conf\`
          EOF

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Repository Bootstrap" \
            --notes-file release_notes.md \
            --prerelease \
            "${{ env.PKGVER }}.noarch.xbps" \
            noarch-repodata
